services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: checkip-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    # Không expose port ra ngoài — chỉ Nginx mới gọi được
    expose:
      - "3000"
    networks:
      - checkip-net

  nginx:
    image: nginx:alpine
    container_name: checkip-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro          # SSL certs (Let's Encrypt)
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - checkip-net

networks:
  checkip-net:
    driver: bridge
